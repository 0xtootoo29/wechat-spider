<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeChat Spider Pro - 微信公众号抓取工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #07c160;
            --secondary-color: #576b95;
        }
        
        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, #059e4f 100%);
        }
        
        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
        }
        
        .nav-link:hover {
            color: white !important;
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        .card-header {
            background: white;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-primary:hover {
            background-color: #059e4f;
            border-color: #059e4f;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-active {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-paused {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-failed {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .log-item {
            padding: 10px;
            border-left: 3px solid #ddd;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
        }
        
        .log-success {
            border-left-color: var(--primary-color);
        }
        
        .log-failed {
            border-left-color: #dc3545;
        }
        
        .sidebar {
            background: white;
            min-height: calc(100vh - 56px);
            border-right: 1px solid #eee;
        }
        
        .sidebar .nav-link {
            color: #333 !important;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 8px;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: #e8f5e9;
            color: var(--primary-color) !important;
        }
        
        .sidebar .nav-link i {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-rss-fill"></i> WeChat Spider Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="bi bi-gear"></i> 设置</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar py-3">
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#" onclick="showSection('dashboard')">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                    <a class="nav-link" href="#" onclick="showSection('accounts')">
                        <i class="bi bi-people"></i> 公众号管理
                    </a>
                    <a class="nav-link" href="#" onclick="showSection('tasks')">
                        <i class="bi bi-list-task"></i> 任务管理
                    </a>
                    <a class="nav-link" href="#" onclick="showSection('articles')">
                        <i class="bi bi-file-text"></i> 文章库
                    </a>
                    <a class="nav-link" href="#" onclick="showSection('analysis')">
                        <i class="bi bi-graph-up"></i> AI 分析
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 py-4 px-4">
                
                <!-- 仪表盘 -->
                <div id="dashboard-section">
                    <h2 class="mb-4"><i class="bi bi-speedometer2"></i> 仪表盘</h2>
                    
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-accounts">0</div>
                                <div class="stat-label">公众号</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-tasks">0</div>
                                <div class="stat-label">任务</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-articles">0</div>
                                <div class="stat-label">总文章</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card">
                                <div class="stat-number" id="stat-today">0</div>
                                <div class="stat-label">今日抓取</div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <i class="bi bi-clock-history"></i> 最近执行记录
                                </div>
                                <div class="card-body" id="recent-logs">
                                    <p class="text-muted">暂无记录</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <i class="bi bi-lightning"></i> 快捷操作
                                </div>
                                <div class="card-body">
                                    <button class="btn btn-primary mb-2 w-100" onclick="showAddAccountModal()">
                                        <i class="bi bi-plus-circle"></i> 添加公众号
                                    </button>
                                    <button class="btn btn-outline-primary mb-2 w-100" onclick="showSection('tasks')">
                                        <i class="bi bi-plus-square"></i> 创建任务
                                    </button>
                                    <button class="btn btn-outline-secondary w-100" onclick="loadStats()">
                                        <i class="bi bi-arrow-clockwise"></i> 刷新数据
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 公众号管理 -->
                <div id="accounts-section" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="bi bi-people"></i> 公众号管理</h2>
                        <button class="btn btn-primary" onclick="showAddAccountModal()">
                            <i class="bi bi-plus-circle"></i> 添加公众号
                        </button>
                    </div>
                    
                    <div class="card">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>公众号名称</th>
                                            <th>微信号</th>
                                            <th>分类</th>
                                            <th>状态</th>
                                            <th>添加时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="accounts-table">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 任务管理 -->
                <div id="tasks-section" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="bi bi-list-task"></i> 任务管理</h2>
                        <button class="btn btn-primary" onclick="showAddTaskModal()">
                            <i class="bi bi-plus-circle"></i> 创建任务
                        </button>
                    </div>
                    
                    <div id="tasks-list">
                        <!-- 任务卡片将在这里动态生成 -->
                    </div>
                </div>

                <!-- 文章库 -->
                <div id="articles-section" style="display: none;">
                    <h2 class="mb-4"><i class="bi bi-file-text"></i> 文章库</h2>
                    
                    <div class="card">
                        <div class="card-body">
                            <div id="articles-list">
                                <p class="text-muted">暂无文章</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AI 分析 -->
                <div id="analysis-section" style="display: none;">
                    <h2 class="mb-4"><i class="bi bi-graph-up"></i> AI 分析</h2>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> AI 分析功能开发中...
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 添加公众号模态框 -->
    <div class="modal fade" id="addAccountModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加公众号</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addAccountForm">
                        <div class="mb-3">
                            <label class="form-label">公众号名称 *</label>
                            <input type="text" class="form-control" id="accName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">微信号 *</label>
                            <input type="text" class="form-control" id="accWechatId" required>
                            <div class="form-text">公众号的微信号，不是昵称</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">gh_id（可选）</label>
                            <input type="text" class="form-control" id="accGhId">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">分类</label>
                            <select class="form-select" id="accCategory">
                                <option value="">请选择</option>
                                <option value="科技">科技</option>
                                <option value="财经">财经</option>
                                <option value="生活">生活</option>
                                <option value="娱乐">娱乐</option>
                                <option value="教育">教育</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea class="form-control" id="accDesc" rows="2"></textarea>
                        </div>
                    </form>
                    
                    <div id="testResult" class="mt-3" style="display: none;">
                        <!-- 测试结果将显示在这里 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-info" onclick="testAccount()">
                        <i class="bi bi-lightning"></i> 测试抓取
                    </button>
                    <button type="button" class="btn btn-primary" onclick="submitAccount()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面切换
        function showSection(section) {
            document.querySelectorAll('[id$="-section"]').forEach(el => {
                el.style.display = 'none';
            });
            document.getElementById(section + '-section').style.display = 'block';
            
            // 更新侧边栏激活状态
            document.querySelectorAll('.sidebar .nav-link').forEach(el => {
                el.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 加载对应数据
            if (section === 'accounts') loadAccounts();
            if (section === 'tasks') loadTasks();
            if (section === 'articles') loadArticles();
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('stat-accounts').textContent = data.total_accounts;
                document.getElementById('stat-tasks').textContent = data.total_tasks;
                document.getElementById('stat-articles').textContent = data.total_articles;
                document.getElementById('stat-today').textContent = data.today_articles;
                
                // 显示最近日志
                const logsContainer = document.getElementById('recent-logs');
                if (data.recent_logs && data.recent_logs.length > 0) {
                    logsContainer.innerHTML = data.recent_logs.map(log => `
                        <div class="log-item log-${log.status}">
                            <div class="d-flex justify-content-between">
                                <span>${log.task_name || '任务'}</span>
                                <span class="status-badge status-${log.status}">${log.status}</span>
                            </div>
                            <small class="text-muted">${new Date(log.start_time).toLocaleString()}</small>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 加载公众号列表
        async function loadAccounts() {
            try {
                const response = await fetch('/api/accounts');
                const accounts = await response.json();
                
                const tbody = document.getElementById('accounts-table');
                tbody.innerHTML = accounts.map(acc => `
                    <tr>
                        <td>${acc.name}</td>
                        <td>${acc.wechat_id}</td>
                        <td>${acc.category || '-'}</td>
                        <td>
                            <span class="status-badge ${acc.status ? 'status-active' : 'status-paused'}">
                                ${acc.status ? '启用' : '禁用'}
                            </span>
                        </td>
                        <td>${new Date(acc.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editAccount('${acc.id}')">编辑</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteAccount('${acc.id}')">删除</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载公众号失败:', error);
            }
        }

        // 显示添加公众号模态框
        function showAddAccountModal() {
            new bootstrap.Modal(document.getElementById('addAccountModal')).show();
        }

        // 测试公众号
        async function testAccount() {
            const wechatId = document.getElementById('accWechatId').value;
            const ghId = document.getElementById('accGhId').value;
            
            if (!wechatId) {
                alert('请输入微信号');
                return;
            }
            
            const resultDiv = document.getElementById('testResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="alert alert-info">测试中，请稍候...</div>';
            
            try {
                const response = await fetch('/api/accounts/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('accName').value || '测试',
                        wechat_id: wechatId,
                        gh_id: ghId
                    })
                });
                
                const result = await response.json();
                
                let checksHtml = '';
                for (const [key, value] of Object.entries(result.checks)) {
                    const badgeClass = value.status === 'pass' ? 'bg-success' : 
                                      value.status === 'warning' ? 'bg-warning' : 'bg-danger';
                    checksHtml += `
                        <div class="mb-2">
                            <span class="badge ${badgeClass}">${value.status}</span>
                            <span class="ms-2">${value.msg}</span>
                        </div>
                    `;
                }
                
                let articlesHtml = '';
                if (result.sample_articles && result.sample_articles.length > 0) {
                    articlesHtml = `
                        <hr>
                        <h6>样本文章：</h6>
                        ${result.sample_articles.map(art => `
                            <div class="mb-2 p-2 bg-light rounded">
                                <strong>${art.title}</strong>
                                <p class="mb-0 small text-muted">${art.summary || ''}</p>
                            </div>
                        `).join('')}
                    `;
                }
                
                resultDiv.innerHTML = `
                    <div class="alert ${result.status === 'success' ? 'alert-success' : 'alert-warning'}">
                        <h6>测试结果：${result.status === 'success' ? '通过' : '有问题'}</h6>
                        ${checksHtml}
                        ${articlesHtml}
                        <hr>
                        <h6>建议：</h6>
                        <ul>${result.suggestions.map(s => `<li>${s}</li>`).join('')}</ul>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">测试失败：${error.message}</div>
`;
            }
        }

        // 提交公众号
        async function submitAccount() {
            const data = {
                name: document.getElementById('accName').value,
                wechat_id: document.getElementById('accWechatId').value,
                gh_id: document.getElementById('accGhId').value,
                category: document.getElementById('accCategory').value,
                description: document.getElementById('accDesc').value
            };
            
            if (!data.name || !data.wechat_id) {
                alert('请填写必填项');
                return;
            }
            
            try {
                const response = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addAccountModal')).hide();
                    document.getElementById('addAccountForm').reset();
                    document.getElementById('testResult').style.display = 'none';
                    loadAccounts();
                    loadStats();
                } else {
                    alert('保存失败');
                }
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
        });
    </script>
</body>
</html>
